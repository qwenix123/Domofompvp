<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domofon PvP | Технический перерыв</title>
    <style>
        :root {
            --main-bg: #f4f7fb;
            --card-gradient: linear-gradient(180deg, #2e5bff 0%, #1a39b5 100%);
            --text-gray: #8e99b7;
            --accent-red: #ff4b4b;
        }

        /* Анимация пульсации щита */
        @keyframes shieldPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Плавное появление всей страницы */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--main-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
            animation: fadeIn 0.8s ease-in;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Основная карточка */
        .status-card {
            background: var(--card-gradient);
            border-radius: 40px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(26, 57, 181, 0.25);
            margin-bottom: 20px;
        }

        .badge-alert {
            background: var(--accent-red);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: shieldPulse 2s infinite ease-in-out;
        }

        .main-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .sub-title {
            font-size: 14px;
            opacity: 0.85;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* Информационные блоки */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background: white;
            padding: 22px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .stat-val {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: #1a39b5;
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .footer-btn {
            background: #e2e8f0;
            color: #64748b;
            width: 100%;
            padding: 18px;
            border-radius: 25px;
            text-align: center;
            margin-top: 20px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-card">
        <div class="badge-alert">Внимание</div>
        
        <div class="shield-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>

        <h1 class="main-title">Domofon PVP</h1>
        <p style="font-size: 18px; font-weight: 700; margin-bottom: 15px;">Технический перерыв</p>
        
        <p class="sub-title">
            Сервера ддосят. Сейчас мы восстанавливаем датабазу и доступ. Пожалуйста, подождите.
        </p>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <span class="stat-val">OFFLINE</span>
            <span class="stat-label">СТАТУС</span>
        </div>
        <div class="stat-item">
            <span class="stat-val">DB FIX</span>
            <span class="stat-label">ЗАДАЧА</span>
        </div>
    </div>

    <div class="footer-btn">Обновить страницу</div>
</div>

</body>
</html>
