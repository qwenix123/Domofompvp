<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domofon PVP | Техработы</title>
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: #161b22;
            --accent-blue: #2e5bff;
            --text-dim: #8b949e;
            --tg-blue: #24A1DE;
        }

        /* Анимация вращения иконки */
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1a1d23, #0a0c10);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.6s ease-out;
        }

        /* Главная панель */
        .main-panel {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(46, 91, 255, 0.1);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
        }

        .icon-box svg {
            animation: rotate 4s linear infinite;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Сетка статусов */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s;
        }

        .stat-val {
            display: block;
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
        }

        .stat-lbl {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.5;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px;
            border-radius: 22px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-refresh {
            background: #ffffff;
            color: #000000;
        }

        .btn-tg {
            background: rgba(36, 161, 222, 0.1);
            color: var(--tg-blue);
            border: 1px solid rgba(36, 161, 222, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <div class="icon-box">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
        
        <h1 class="title">Domofon PVP</h1>
        <p class="description">
            Проводим плановые технические работы. Оптимизируем код и фиксим баги для стабильной игры.
        </p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val">БАГИ</span>
            <span class="stat-lbl">Фиксим</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">В СЕТИ</span>
            <span class="stat-lbl">Скоро</span>
        </div>
    </div>

    <a href="#" class="btn btn-refresh" onclick="location.reload()">
        ОБНОВИТЬ СТРАНИЦУ
    </a>

    <a href="https://t.me/DomofonPVP" class="btn btn-tg" target="_blank">
        НОВОСТИ ПРОЕКТА
    </a>

    <div class="footer-note">
        Спасибо за ожидание! Мы стараемся для вас.
    </div>
</div>

</body>
</html>
