<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomofonPvP: New Era</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #4299e1;
            --accent-hover: #3182ce;
            --shadow-light: #ffffff;
            --shadow-dark: #cbd5e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ультра-новый вид: Неоморфизм */
        .card {
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            padding: 20px;
            margin: 15px;
            width: 100%;
            max-width: 600px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2em;
            font-weight: bold;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .btn:active {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2), inset -4px -4px 8px rgba(255,255,255,0.1);
        }

        .ability-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .ability-card {
            background: var(--bg-color);
            border-radius: 15px;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .rank-badge {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            padding: 5px 10px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-stats">
            <span id="player-level">Level: 1</span>
            <span id="total-elo">🏆 Total Elo: 0</span>
            <span id="coins">🪙 Coins: 1000</span>
        </div>
        <p style="text-align: center; color: var(--text-muted);">Путь к славе: Следующая награда на 1000 🏆</p>
    </div>

    <div class="card">
        <h2>Способности (Выбор для матчмейкинга)</h2>
        <div class="ability-list" id="abilities-container">
            </div>
    </div>

    <div class="card">
        <h2>Сезон</h2>
        <p id="season-info">До конца сезона: 12 дней</p>
        <button class="btn" onclick="triggerSeasonReset()">Сбросить сезон (Админ)</button>
    </div>

    <script>
        // --- БАЗА ДАННЫХ ИГРОКА ---
        let player = {
            level: 50, // Для теста поставим 50
            maxLevel: 50,
            coins: 5000,
            totalElo: 0,
            abilities: [
                { id: 1, name: "Огненный шар", elo: 450, powerLevel: 1 },
                { id: 2, name: "Ледяной щит", elo: 520, powerLevel: 4 },
                { id: 3, name: "Рывок тени", elo: 760, powerLevel: 7 },
                { id: 4, name: "Хил волна", elo: 120, powerLevel: 1 },
                { id: 5, name: "Токсичный туман", elo: 5000, powerLevel: 10 }, // Ранг 20 тест
                { id: 6, name: "Удар молнии", elo: 0, powerLevel: 1 },
                { id: 7, name: "Землетрясение", elo: 0, powerLevel: 1 },
                { id: 8, name: "Вампиризм", elo: 0, powerLevel: 1 },
                { id: 9, name: "Клон", elo: 0, powerLevel: 1 },
                { id: 10, name: "Метеорит", elo: 0, powerLevel: 1 }
            ]
        };

        // --- ЛОГИКА РАНГОВ ---
        function getRankAndReset(elo) {
            let rank = 1;
            let resetTo = elo;
            let dropAmount = 0;

            // Расчет ранга (примерный)
            if (elo < 500) rank = Math.floor(elo / 50) + 1;
            else if (elo < 5000) rank = 10 + Math.floor((elo - 500) / 450);
            else if (elo >= 5000) rank = 20 + Math.floor((elo - 5000) / 500);

            // Логика сброса сезона (а-ля Бравл Старс)
            if (elo >= 500 && elo < 750) { resetTo = 500; dropAmount = elo - 500; }
            else if (elo >= 750 && elo < 1000) { resetTo = 700; dropAmount = elo - 700; }
            else if (elo >= 1000) { resetTo = 900; dropAmount = elo - 900; }

            return { rank, resetTo, dropAmount };
        }

        // --- ЛОГИКА ПРОКАЧКИ ---
        function upgradeAbility(id) {
            let ability = player.abilities.find(a => a.id === id);
            let cost = ability.powerLevel * 100; // Цена растет с уровнем

            if (player.coins >= cost && ability.powerLevel < 10) {
                player.coins -= cost;
                ability.powerLevel++;
                updateUI();
            } else if (ability.powerLevel >= 10) {
                alert("Максимальная сила!");
            } else {
                alert("Не хватает монет!");
            }
        }

        // --- СБРОС СЕЗОНА (Имитация Firebase) ---
        function triggerSeasonReset() {
            let totalBling = 0; // Звездные очки за сброс
            player.abilities.forEach(ab => {
                let stats = getRankAndReset(ab.elo);
                totalBling += stats.dropAmount;
                ab.elo = stats.resetTo;
            });
            alert(`Сезон завершен! Вы получили ${totalBling} звездных очков за сброс Эло.`);
            updateUI();
            // Тут позже вызовем firebase.database().ref('users/' + userId).set(player);
        }

        // --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
        function updateUI() {
            // Расчет Тотал Эло
            player.totalElo = player.abilities.reduce((sum, ab) => sum + ab.elo, 0);

            // Обработка Lvl MAX + Трофеи
            let levelDisplay = player.level >= player.maxLevel 
                ? `Lvl MAX + ${player.totalElo}` 
                : `Level: ${player.level}`;

            document.getElementById('player-level').innerText = levelDisplay;
            document.getElementById('total-elo').innerText = `🏆 Total Elo: ${player.totalElo}`;
            document.getElementById('coins').innerText = `🪙 Coins: ${player.coins}`;

            const container = document.getElementById('abilities-container');
            container.innerHTML = '';

            player.abilities.forEach(ab => {
                let stats = getRankAndReset(ab.elo);
                let upgradeCost = ab.powerLevel * 100;

                let card = document.createElement('div');
                card.className = 'ability-card';
                card.innerHTML = `
                    <div class="rank-badge">Rank ${stats.rank}</div>
                    <h3>${ab.name}</h3>
                    <p>🏆 ${ab.elo} Эло</p>
                    <p>⚡ Сила: ${ab.powerLevel}/10</p>
                    <p style="font-size: 0.8em; color: var(--text-muted);">Сброс сезона: -${stats.dropAmount} 🏆</p>
                    <button class="btn" style="margin-top: auto;" onclick="upgradeAbility(${ab.id})">
                        Апгрейд (${upgradeCost} 🪙)
                    </button>
                `;
                container.appendChild(card);
            });
        }

        // Инициализация при загрузке
        updateUI();

    </script>
</body>
</html>
