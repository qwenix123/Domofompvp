<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DomofonPvP: Ultra</title>
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f8f9fa;
            --accent: #007bff;
            --text: #212529;
            --gray: #6c757d;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden; /* Чтобы не скроллилось во время игры */
            user-select: none;
        }

        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: var(--gray);
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* Контент вкладок */
        .page {
            display: none;
            height: calc(100vh - 70px);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .page.active { display: block; }

        /* Карточки способностей */
        .ability-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .ability-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 2px solid transparent;
        }

        .ability-card.selected { border-color: var(--accent); }

        .rank-tag {
            background: #ffc107;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Игровая Арена */
        #game-canvas {
            background: #fff;
            border: 2px solid #eee;
            display: block;
            margin: 0 auto;
            box-shadow: var(--shadow);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:disabled { background: #ccc; }

    </style>
</head>
<body>
