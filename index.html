<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domofon PvP | Технические работы</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-blue: linear-gradient(180deg, #2563eb 0%, #1e40af 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Основная карточка в стиле профиля */
        .maintenance-card {
            background: var(--card-blue);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid var(--accent-green);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .status-badge {
            background: var(--accent-green);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            text-transform: lowercase;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .elo-text {
            font-size: 48px;
            font-weight: 800;
            margin: 10px 0;
        }

        .description {
            opacity: 0.8;
            font-size: 14px;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Полоска прогресса (загрузки) */
        .progress-container {
            margin-top: 30px;
            text-align: left;
        }

        .progress-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 65%; /* Уровень готовности */
            background: var(--accent-orange);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent-orange);
        }

        /* Нижние инфо-блоки */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 25px;
            color: #1e293b;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #1e3a8a;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.5;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="maintenance-card">
        <div class="status-badge">DOMOFON ELITE</div>
        
        <div class="icon-wrapper">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </div>

        <h1>domofon</h1>
        <div class="elo-text">UPDATE</div>
        
        <p class="description">
            Мы проводим технические работы по улучшению серверов. Скоро вернемся в строй!
        </p>

        <div class="progress-container">
            <div class="progress-label">
                <span>Прогресс обновления</span>
                <span>65%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-value">404</div>
            <div class="stat-label">СТАТУС КОД</div>
        </div>
        <div class="stat-box">
            <div class="stat-value">~2Ч</div>
            <div class="stat-label">ОЖИДАНИЕ</div>
        </div>
    </div>
</div>

</body>
</html>
