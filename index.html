<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DomofonPvP Ultra</title>
    <style>
        :root { --bg: #ffffff; --panel: #f8f9fa; --accent: #007bff; --text: #1a1a1a; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Интерфейс */
        .top-bar { display: flex; justify-content: space-between; padding: 15px; font-weight: bold; border-bottom: 1px solid #eee; background: #fff; position: relative; z-index: 10; }
        .tabs { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; }
        .tab-btn { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: #888; }
        .tab-btn.active { color: var(--accent); font-weight: bold; }
        
        .screen { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .screen.active { display: block; }

        /* ПВП Арена */
        #gameCanvas { display: block; background: #fdfdfd; width: 100%; height: 100%; touch-action: none; border: 1px solid #eee; }
        .controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn-ctrl { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-weight: bold; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Способности */
        .ability-card { background: var(--panel); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .rank-tag { background: #ffcc00; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-up { background: var(--accent); color: #fff; border: none; padding: 8px; border-radius: 6px; width: 100%; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="p-lvl">LVL 1</div>
    <div id="p-coins">🪙 500</div>
    <div id="p-elo">🏆 0</div>
</div>

<div id="sc-battle" class="screen active" style="padding:0; position: relative;">
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button class="btn-ctrl" id="moveBtn">MOVE</button>
        <button class="btn-ctrl" style="background:#ff4757" onclick="shoot()">HIT</button>
    </div>
</div>

<div id="sc-units" class="screen">
    <h3>Способности (10)</h3>
    <div id="ability-list"></div>
</div>

<div class="tabs">
    <div class="tab-btn active" onclick="showTab('battle', this)">Битва</div>
    <div class="tab-btn" onclick="showTab('units', this)">Бойцы</div>
</div>

<script>
    let player = { lvl: 1, coins: 500, selected: 0, abilities: [] };
    const names = ["Огонь", "Лед", "Яд", "Гром", "Тень", "Свет", "Ветер", "Сталь", "Хаос", "Дух"];

    for(let i=0; i<10; i++) {
        player.abilities.push({ id: i, name: names[i], elo: 0, power: 1 });
    }

    // Ранги: до 5000 Эло (20 ранг), потом 25+
    function getRank(elo) {
        if(elo < 5000) return Math.floor(elo / 250) + 1;
        return 20 + Math.floor((elo - 5000) / 500);
    }

    function updateUI() {
        let total = player.abilities.reduce((s, a) => s + a.elo, 0);
        document.getElementById('p-lvl').innerText = player.lvl >= 100 ? `MAX+${total}` : `LVL ${player.lvl}`;
        document.getElementById('p-coins').innerText = `🪙 ${player.coins}`;
        document.getElementById('p-elo').innerText = `🏆 ${total}`;
        
        const list = document.getElementById('ability-list');
        list.innerHTML = '';
        player.abilities.forEach((ab, i) => {
            let rank = getRank(ab.elo);
            let cost = ab.power * 200;
            list.innerHTML += `
                <div class="ability-card" style="${player.selected == i ? 'border-color:#007bff' : ''}">
                    <span class="rank-tag">Rank ${rank}</span> <b>${ab.name}</b> | 🏆 ${ab.elo}
                    <div style="font-size:12px; margin-top:5px;">Сила: ${ab.power}</div>
                    <button class="btn-up" onclick="upgrade(${i})">Улучшить (${cost} 🪙)</button>
                    <button class="btn-up" style="background:#555" onclick="select(${i})">Выбрать</button>
                </div>`;
        });
    }

    function upgrade(i) {
        let ab = player.abilities[i];
        let cost = ab.power * 200;
        if(player.coins >= cost) { player.coins -= cost; ab.power++; updateUI(); }
    }
    function select(i) { player.selected = i; updateUI(); }

    // Простой PvP движок
    const cvs = document.getElementById('gameCanvas');
    const ctx = cvs.getContext('2d');
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight - 120;

    let pX = 50, pY = 50, eX = 200, eY = 200, bullets = [];

    function shoot() {
        bullets.push({x: pX, y: pY});
    }

    function loop() {
        ctx.clearRect(0,0,cvs.width, cvs.height);
        // Игрок
        ctx.fillStyle = "#007bff"; ctx.beginPath(); ctx.arc(pX, pY, 15, 0, 7); ctx.fill();
        // Враг
        ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(eX, eY, 20, 0, 7); ctx.fill();
        
        bullets.forEach((b, i) => {
            b.x += 7;
            ctx.fillStyle = "#000"; ctx.fillRect(b.x, b.y, 10, 4);
            if(Math.hypot(b.x - eX, b.y - eY) < 25) {
                bullets.splice(i, 1);
                win();
            }
        });
        requestAnimationFrame(loop);
    }

    function win() {
        let ab = player.abilities[player.selected];
        let gain = ab.elo > 4000 ? 5 : 20; // Сложнее добывать трофеи
        ab.elo += gain;
        player.coins += 50;
        eX = Math.random() * (cvs.width - 40) + 20;
        eY = Math.random() * (cvs.height - 40) + 20;
        updateUI();
    }

    // Управление
    document.getElementById('moveBtn').addEventListener('touchstart', () => {
        pX = Math.random() * (cvs.width - 40);
        pY = Math.random() * (cvs.height - 40);
    });

    function showTab(t, b) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('sc-' + t).classList.add('active');
        b.classList.add('active');
    }

    updateUI();
    loop();
</script>

</body>
</html>
